name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.11.0"

jobs:
  # ─────────────────────────────────────────────
  # LINT — fmt check on every push/PR
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform fmt check
        run: terraform fmt -check -recursive .

  # ─────────────────────────────────────────────
  # VALIDATE — runs terraform validate on each
  # changed module (no AWS credentials needed)
  # ─────────────────────────────────────────────
  validate:
    name: Validate / ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        module:
          - networking
          - rds
          - elasticache
          - lambda
          - api-gateway
          - cloudfront
          - s3-buckets
          - secrets
          - sns
          - ses
          - eventbridge

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform init (local)
        run: |
          cd ${{ matrix.module }}
          terraform init -backend=false

      - name: terraform validate
        run: |
          cd ${{ matrix.module }}
          terraform validate
